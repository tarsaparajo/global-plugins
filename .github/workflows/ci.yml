name: CI

on:
  push:
    branches: [main, 'release/**']
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }}, Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        node: ['18.x', '20.x', '22.x']
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Run test suite
        run: node tests/run-all.js

  compliance:
    name: Compliance gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Run compliance audit
        run: node -e "const c=require('./engine/compliance');const r=c.audit(process.cwd());console.log(JSON.stringify(r.findings,null,2));process.exit(r.ok?0:1)"

      - name: Verify version sync
        run: node -e "const s=require('./engine/semver');const r=s.checkSync(process.cwd());if(!r.ok){console.error(JSON.stringify(r.drift));process.exit(1)}console.log('version synced:',r.version)"
