<rect x="1497" y="180" width="406" height="1010" rx="18" fill="rgba(238,242,246,0.025)" stroke="rgba(238,242,246,0.10)" stroke-width="1.5"/>
<circle cx="1543" cy="222" r="7" fill="url(#accent)"/>
<text x="1565" y="232" font-family="Menlo, 'Andale Mono', monospace" font-size="27" font-weight="bold" letter-spacing="3" fill="#eef2f6">SKILLS</text>
