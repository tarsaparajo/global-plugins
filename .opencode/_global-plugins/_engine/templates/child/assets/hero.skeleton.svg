<rect x="1930" y="180" width="406" height="1010" rx="18" fill="rgba(238,242,246,0.025)" stroke="rgba(238,242,246,0.10)" stroke-width="1.5"/>
<circle cx="1976" cy="222" r="7" fill="url(#accent)"/>
