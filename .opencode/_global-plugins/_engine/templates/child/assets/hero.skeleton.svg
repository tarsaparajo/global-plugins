<line x1="1537" y1="268" x2="1869" y2="268" stroke="rgba(238,242,246,0.18)" stroke-width="2" stroke-dasharray="2 8"/>
<g opacity="1"><rect x="1521" y="292" width="358" height="54" rx="10" fill="rgba(52,211,153,0.08)" stroke="url(#accentStroke)" stroke-width="1.5"/><circle cx="1545" cy="319" r="5" fill="url(#accent)"/><text x="1563" y="327" font-family="Menlo, 'Andale Mono', monospace" font-size="24" fill="#a7f3d8">[SKILL 1]</text></g>
