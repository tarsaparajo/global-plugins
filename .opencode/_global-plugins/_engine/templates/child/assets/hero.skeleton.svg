<!-- ===== FOOTER — justified metric groups, space-between, separators in the gaps ===== -->
<!-- Each group is either a big number + muted label, a single gradient word, or
     a right-aligned repo. Replace with metrics that matter for the plugin; keep
     them justified across L=64 … R=2336 with a vertical separator in each gap. -->
<line x1="64" y1="1232" x2="2336" y2="1232" stroke="rgba(238,242,246,0.08)" stroke-width="1.5"/>
