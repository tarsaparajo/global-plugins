<g opacity="1"><rect x="1521" y="428" width="358" height="54" rx="10" fill="rgba(238,242,246,0.035)" stroke="rgba(238,242,246,0.05)" stroke-width="1.5"/><circle cx="1545" cy="455" r="5" fill="#4a5663"/><text x="1563" y="463" font-family="Menlo, 'Andale Mono', monospace" font-size="24" fill="#c4ccd6">[SKILL 3]</text></g>
<g opacity="1"><rect x="1521" y="496" width="358" height="54" rx="10" fill="rgba(238,242,246,0.035)" stroke="rgba(238,242,246,0.05)" stroke-width="1.5"/><circle cx="1545" cy="523" r="5" fill="#4a5663"/><text x="1563" y="531" font-family="Menlo, 'Andale Mono', monospace" font-size="24" fill="#c4ccd6">[SKILL 4]</text></g>
<g opacity="0.65"><rect x="1521" y="564" width="358" height="54" rx="10" fill="rgba(238,242,246,0.035)" stroke="rgba(238,242,246,0.05)" stroke-width="1.5"/><circle cx="1545" cy="591" r="5" fill="#4a5663"/><text x="1563" y="599" font-family="Menlo, 'Andale Mono', monospace" font-size="24" fill="#c4ccd6">[SKILL 5 …]</text></g>
<rect x="1499" y="950" width="402" height="238" rx="16" fill="url(#cardFade)"/>
<text x="1700" y="1148" text-anchor="middle" font-family="Menlo, 'Andale Mono', monospace" font-size="26" fill="#566472">[+[K] more / complete]</text>

